services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    networks:
      - default
    restart: unless-stopped
    ports:
      - 8081:5173
    image: lenorechore_frontend:development
    container_name: lenorechore_frontend_dev
    volumes:
      - ./frontend:/app
    env_file:
      - ./.env.dev
    environment:
      - NODE_ENV=development
      - TZ=America/New_York
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5173/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: /usr/src/app/start.dev.sh
    volumes:
      - ./backend:/usr/src/app
    environment:
      - DEBUG=1
      - TZ=America/New_York
    ports:
      - 8001:8001
      - 8002:8002
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
    env_file:
      - ./.env.dev
    image: lenorechore_backend:development
    container_name: lenorechore_backend_dev
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/api/v2/version/list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: /usr/src/app/start_worker.sh
    volumes:
      - ./backend:/usr/src/app
    environment:
      - DEBUG=1
      - TZ=America/New_York
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - default
    env_file:
      - ./.env.dev
    image: lenorechore_worker:development
    container_name: lenorechore_worker_dev
  redis:
    image: redis:7-alpine
    networks:
      - default
    container_name: lenorechore_redis_dev
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - ./.env.dev
    networks:
      - default
    container_name: lenorechore_db_dev
    environment:
      - POSTGRES_USER=${SQL_USER}
      - POSTGRES_PASSWORD=${SQL_PASSWORD}
      - POSTGRES_DB=${SQL_DATABASE}
      - TZ=America/New_York
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  static_volume:
  media_volume:
